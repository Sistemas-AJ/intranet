version: '3.9'

services:
  web:
    build: .
    ports:
      - "3500:3500"
    volumes:
      - ./clientes:/app/clientes
      - ./data:/app/data
    environment:
      - PORT=3500
      # keep same sqlite file for now; later DATABASE_URL will switch to PG
      - DB_FILE=database.sqlite
      - JWT_SECRET=supersecret
      - ALLOWED_ORIGINS=http://localhost:5173
      # when migrating, you would set DATABASE_URL to something like
      # postgres://user:pass@db:5432/intranet
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: intranet
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
