version: '3.9'

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "3500:3500"
    volumes:
      - ./clientes:/app/clientes
      - ./data:/app/data
    environment:
      - PORT=3500
      - DATABASE_URL=postgres://appuser:apppassword@db:5432/intranet
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: intranet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d intranet"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
